<!DOCTYPE html>
<html>
<head>
    <title>Acesso ao Sistema</title>
</head>
<body>
    <div style="max-width: 400px; margin: 50px auto; padding: 20px; border: 1px solid #ccc;">
        <h2>Login ERP Costura</h2>
        
        {% if form.errors %}
            <p style="color: red;">Usuário ou senha incorretos. Tente novamente.</p>
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" style="width: 100%; padding: 10px;">Entrar</button>
        </form>
    </div>
</body>
</html>
