<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ckaizen Ateliê — Acesso</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --ckaizen-pink: #E0A39F;
            --ckaizen-pink-hover: #c98e8a;
            --ckaizen-brown: #8B7365;
            --ckaizen-cream: #F5F2E6;
            --ckaizen-bg: #fcfbf9;
        }

        body {
            background-color: var(--ckaizen-bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: var(--ckaizen-brown);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-card {
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.07);
            padding: 2.5rem 2rem;
            width: 100%;
            max-width: 400px;
        }

        .login-brand {
            text-align: center;
            margin-bottom: 2rem;
        }

        .login-brand h1 {
            color: var(--ckaizen-pink);
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 1px;
            margin: 0;
        }

        .login-brand p {
            color: var(--ckaizen-brown);
            font-size: 0.85rem;
            margin: 4px 0 0;
            opacity: 0.7;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--ckaizen-brown);
        }

        .form-control {
            border-color: #e0ddd6;
            color: var(--ckaizen-brown);
        }

        .form-control:focus {
            border-color: var(--ckaizen-pink);
            box-shadow: 0 0 0 0.25rem rgba(224, 163, 159, 0.25);
        }

        .btn-login {
            background-color: var(--ckaizen-pink);
            border-color: var(--ckaizen-pink);
            color: var(--ckaizen-brown);
            font-weight: 700;
            width: 100%;
            padding: 0.6rem;
        }

        .btn-login:hover {
            background-color: var(--ckaizen-pink-hover);
            border-color: var(--ckaizen-pink-hover);
            color: var(--ckaizen-brown);
        }

        .divider {
            border-color: #e0ddd6;
            margin: 1.5rem 0;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-brand">
            <h1>🩰 Ckaizen</h1>
            <p>Sistema de Gestão do Ateliê</p>
        </div>

        {% if form.errors %}
        <div class="alert alert-danger fw-bold text-center py-2" style="font-size: 0.875rem;">
            E-mail ou senha incorretos. Tente novamente.
        </div>
        {% endif %}

        <hr class="divider">

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">E-mail</label>
                <input type="email" name="username" class="form-control" placeholder="seu@email.com" autofocus required>
            </div>
            <div class="mb-4">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-login">Entrar</button>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
