{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header card-header-ckaizen text-center">
                <h4 class="mb-0">Baixar Pagamento</h4>
            </div>
            <div class="card-body bg-white rounded-bottom p-4">
                <div class="alert alert-warning text-center border-warning fw-bold text-dark shadow-sm">
                    Comanda: #{{ comanda.id }} <br>
                    Saldo a Receber: <span class="fs-4 d-block mt-1">R$ {{ comanda.saldo_devedor }}</span>
                </div>
                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <div class="text-ckaizen fw-bold small">
                        {{ form.as_p }}
                    </div>
                    <div class="d-flex gap-2 mt-4">
                        <a href="{% url 'listar_comandas' %}" class="btn btn-light w-50 fw-bold text-muted">Cancelar</a>
                        <button type="submit" class="btn btn-success w-50 fw-bold shadow-sm">Confirmar</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
