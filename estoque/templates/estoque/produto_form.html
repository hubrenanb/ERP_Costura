{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-sm border-0">
            <div class="card-header card-header-ckaizen text-center">
                <h4 class="mb-0">Cadastrar Produto</h4>
            </div>
            <div class="card-body p-4 bg-white rounded-bottom">
                <form method="post">
                    {% csrf_token %}
                    <div class="text-ckaizen fw-bold small">
                        {{ form.as_p }}
                    </div>
                    <div class="d-flex gap-3 mt-4">
                        <button type="submit" class="btn btn-primary fw-bold flex-grow-1 shadow-sm">Salvar</button>
                        <a href="{% url 'listar_estoque' %}" class="btn btn-light text-muted fw-bold">Cancelar</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
